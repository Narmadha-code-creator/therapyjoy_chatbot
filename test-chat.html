<!DOCTYPE html>
<html>
<head>
  <title>TherapyJoy Chatbot Test</title>
  <style>
    body { font-family: Arial; max-width: 600px; margin: 50px auto; }
    #chat { border: 1px solid #ccc; height: 400px; overflow-y: scroll; padding: 10px; margin-bottom: 10px; }
    #input { width: 80%; padding: 10px; }
    button { padding: 10px 20px; }
    .user { color: blue; }
    .bot { color: green; }
  </style>
</head>
<body>
  <h1>TherapyJoy Chatbot Test (OpenAI Ready)</h1>
  <div id="chat"></div>
  <input id="input" type="text" placeholder="Type message...">
  <button onclick="sendMessage()">Send</button>

  <script>
    const chatDiv = document.getElementById('chat');
    const input = document.getElementById('input');

    async function addMessage(content, isUser = false) {
      const div = document.createElement('div');
      div.className = isUser ? 'user' : 'bot';
      div.textContent = content;
      chatDiv.appendChild(div);
      chatDiv.scrollTop = chatDiv.scrollHeight;
    }

    async function sendMessage() {
      const message = input.value.trim();
      if (!message) return;

      addMessage(message, true);
      input.value = '';

      try {
        const res = await fetch('http://localhost:5000/api/chat', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({message})
        });
        const data = await res.json();
        addMessage(data.reply);
      } catch (e) {
        addMessage('Error: ' + e.message);
      }
    }

    input.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>
</html>
