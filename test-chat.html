<!DOCTYPE html>
<html>
<head>
  <title>TherapyJoy Gemini AI Chatbot Test</title>
  <style>
    * { box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
      max-width: 800px; margin: 0 auto; padding: 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
      min-height: 100vh; 
    }
    #chat { 
      background: white; height: 500px; overflow-y: auto; padding: 20px; border-radius: 20px; 
      box-shadow: 0 20px 40px rgba(0,0,0,0.1); margin-bottom: 20px;
      display: flex; flex-direction: column; gap: 15px;
    }
    .message { 
      max-width: 70%; padding: 12px 18px; border-radius: 20px; word-wrap: break-word; 
    }
    .user { background: #007bff; color: white; align-self: flex-end; }
    .bot { background: #f1f3f4; color: #333; align-self: flex-start; }
    #input-container { display: flex; gap: 10px; }
    #input { flex: 1; padding: 15px; border: none; border-radius: 25px; font-size: 16px; outline: none; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
    button { 
      padding: 15px 30px; background: linear-gradient(45deg, #667eea, #764ba2); color: white; border: none; 
      border-radius: 25px; cursor: pointer; font-weight: bold; transition: transform 0.2s;
    }
    button:hover { transform: scale(1.05); }
    h1 { text-align: center; color: white; margin-bottom: 30px; font-size: 2.5em; text-shadow: 0 2px 10px rgba(0,0,0,0.3); }
    .status { text-align: center; color: #ddd; font-style: italic; }
    .emergency { background: #ff4444 !important; color: white !important; }
  </style>
</head>
<body>
  <h1>🚀 TherapyJoy - Gemini AI Therapy Bot</h1>
  <div class="status" id="status">Connecting to Gemini AI... (Free tier)</div>
  <div id="chat"></div>
  <div id="input-container">
    <input id="input" type="text" placeholder="How can I support you today? Talk about stress, health...">
    <button onclick="sendMessage()">Send 🚀</button>
  </div>
  <p style="text-align: center; color: white; margin-top: 20px;">
    <strong>Backend:</strong> <span id="backend-url"></span> | 
    <strong>API:</strong> POST /api/chat | 
    <em>Features: Emergency detection, Chat history, Gemini AI</em>
  </p>

  <script>
    const chatDiv = document.getElementById('chat');
    const input = document.getElementById('input');
    const status = document.getElementById('status');
    const backendUrl = document.getElementById('backend-url');
    
    backendUrl.textContent = window.location.origin;
    status.textContent = `Gemini AI ready at ${window.location.origin}/api/chat`;

    function addMessage(content, isUser = false, isEmergency = false) {
      const div = document.createElement('div');
      div.className = `message ${isUser ? 'user' : 'bot'}${isEmergency ? ' emergency' : ''}`;
      div.innerHTML = content.replace(/\n/g, '<br>');
      chatDiv.appendChild(div);
      chatDiv.scrollTop = chatDiv.scrollHeight;
    }

    async function sendMessage() {
      const message = input.value.trim();
      if (!message) return;

      addMessage(message, true);
      input.value = '';
      status.textContent = 'Gemini AI thinking...';

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message, userId: 'demo-user' })
        });

        if (!res.ok) throw new Error(`Server error: ${res.status}`);

        const data = await res.json();
        addMessage(data.reply, false, data.reply.toLowerCase().includes('emergency'));
        status.textContent = 'Ready for your next message 💬';
      } catch (e) {
        addMessage(`❌ Error: ${e.message}<br>Add GEMINI_API_KEY to .env & restart server.`, false);
        console.error('Chat error:', e);
        status.textContent = 'Error - Check console & GEMINI_API_KEY';
      }
    }

    input.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    // Welcome messages
    addMessage('Hello! 👋 I\'m TherapyJoy, powered by Google Gemini AI (free!).<br>I can help with emotional support, stress relief, general health info.<br><strong>Remember:</strong> I don\'t diagnose or prescribe - see a doctor for medical advice! 😊');
    status.textContent = 'Gemini AI ready! Try: "I feel anxious today"';
  </script>
</body>
</html>
